[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "icalcc"
version = "0.1.4"
description = "Locally centered contrast functions for scikit-learn FastICA"
readme = "README.md"
license = "CC-BY-4.0"
authors = [
    { name = "Tetsuya Saito", email = "ted@kleinverse.io" }
]
keywords = [
    "ICA", "independent component analysis", "blind source separation",
    "locally centered contrast", "cumulants", "higher-order statistics",
    "Renyi entropy", "FastICA", "scikit-learn"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.9"
dependencies = [
    "numpy>=1.24",
    "scikit-learn>=1.3",
]

[project.urls]
Repository = "https://github.com/Kleinverse/icalcc"
"GPU Extension" = "https://github.com/Kleinverse/gpuicalcc"
Research = "https://github.com/Kleinverse/research"

[tool.setuptools]
py-modules = ["icalcc"]
